version: "3.9"

services:
  redis:
    image: redis:7-alpine
    container_name: video-mox-redis
    ports:
      - "6379:6379"

    volumes:
      - redis_data:/data

    restart: unless-stopped

    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

    command: redis-server --appendonly yes

volumes:
  redis_data: